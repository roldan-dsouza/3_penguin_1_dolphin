<!doctype html>
<html>
  <head>
    <title>Dyslexia Assist</title>
    <style>
      body {
        width: 260px;
        font-family: Arial;
        padding: 10px;
        font-weight: bold;
        background-color: lightskyblue;
        font-size: large;
      }

      label {
        font-size: 12px;
        display: block;
        margin-top: 8px;
      }

      input,
      select {
        width: 100%;
      }

      button {
        margin-top: 12px;
        width: 100%;
        padding: 6px;
      }
    </style>
  </head>
  <body>
    <label>Font Style</label>
    <select id="fontFamily">
      <option value="Arial, sans-serif">Arial</option>
      <option value="Verdana, sans-serif">Verdana</option>
      <option value="Georgia, serif">Georgia</option>
      <option value="'OpenDyslexic', sans-serif">OpenDyslexic</option>
    </select>

    <label>Font Size (px)</label>
    <input type="range" id="fontSize" min="14" max="32" value="18" />

    <label>Line Height</label>
    <input
      type="range"
      id="lineHeight"
      min="1"
      max="3"
      step="0.1"
      value="1.8"
    />

    <label>Word Spacing (em)</label>
    <input
      type="range"
      id="wordSpacing"
      min="0"
      max="1"
      step="0.05"
      value="0.15"
    />

    <label>Background Color</label>
    <input type="color" id="background" value="#f4ecd8" />

    <button id="apply">Apply</button>

    <script src="popup.js"></script>
  </body>
</html>
